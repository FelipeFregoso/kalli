name: Deploy Kalli a Bluehost

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: kalli-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Publicar sitio Kalli
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Descargar código
        uses: actions/checkout@v6

      - name: Subir archivos a Bluehost
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21

          # Usa esta opción si index.php está en la raíz del repositorio.
          local-dir: ./

          # Ruta exacta de Kalli en Bluehost.
          server-dir: /public_html/kalli/

          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            **/.env
            **/.env.*
            README.md
            README-Fase-2.md
            INSTRUCCIONES-DEPLOY.md
            deploy-test.txt
            .DS_Store

          log-level: standard